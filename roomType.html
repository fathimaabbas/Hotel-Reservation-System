<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StaySmart - Rooms</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .room-list { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px; }
    .room-card { border: 1px solid #ddd; border-radius: 10px; width: 250px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .room-card img { width: 100%; height: 160px; object-fit: cover; }
    .room-details { padding: 10px; }
    .reserve-btn { display: block; width: 100%; text-align: center; padding: 8px 0; margin-top: 10px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    .reserve-btn:hover { background: #c0392b; }
  </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">StaySmart</a>
        
        <!-- hamburger Menu Toggle -->
        <span class="menu-toggle" onclick="toggleMenu()">☰</span>
        
        <ul id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Hotels</a></li>
        <li><a href="review.html">Reviews</a></li>
        <li><a href="support.html">Support</a></li>
        <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    

  <header style="text-align:center; margin-top:20px;">
    <h2 id="roomtype-title">Rooms</h2>
  </header>

  <section class="room-list" id="room-list"></section>

  <script>
    function toggleMenu() {
      document.getElementById('nav-links').classList.toggle('show');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const hotelId = params.get('hotelId');
      const hotelName = params.get('hotelName') || 'Rooms';

      if (!hotelId) return;

      document.getElementById('roomtype-title').innerText = `Rooms in ${hotelName}`;
      const roomList = document.getElementById('room-list');
      roomList.innerHTML = '<p>Loading rooms...</p>';

      try {
        // Fetch all rooms for this hotel
        const res = await fetch(`http://localhost:3000/rooms?hotelId=${hotelId}`);
        const rooms = await res.json();

        roomList.innerHTML = '';

        if (rooms.length === 0) {
          roomList.innerHTML = '<p>No rooms available in this hotel.</p>';
          return;
        }

        rooms.forEach(room => {
          const div = document.createElement('div');
          div.className = 'room-card';
          div.innerHTML = `
            <img src="${room.RoomImage}" alt="${room.TypeName}">
            <div class="room-details">
              <h3>${room.TypeName}</h3>
              <p><b>Capacity:</b> ${room.Capacity}</p>
              <p><b>Room ID:</b> ${room.Roomid}</p>
              <a href="reserve.html?hotelId=${hotelId}&roomId=${room.Roomid}" class="reserve-btn">Reserve</a>
            </div>
          `;
          roomList.appendChild(div);
        });

      } catch (err) {
        console.error(err);
        roomList.innerHTML = '<p>Error loading rooms.</p>';
      }
    });
  </script>
</body>
</html>
